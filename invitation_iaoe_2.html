<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e14; color: #c8d6e0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.container { max-width: 640px; width: 90%%; text-align: center; padding: 40px 20px; }
.logo-zone { margin-bottom: 40px; opacity: 0; animation: fadeIn 2s ease forwards; }
.logo-zone svg { width: 60px; height: 60px; margin-bottom: 12px; }
.logo-name { font-family: 'JetBrains Mono', monospace; font-size: 18px; letter-spacing: 0.3em; color: #4a8db7; }
.logo-tagline { font-size: 9px; letter-spacing: 0.25em; color: #3a6a8a; text-transform: uppercase; margin-top: 4px; }
.play-btn { display: inline-flex; align-items: center; gap: 10px; background: rgba(74,141,183,0.1); border: 1px solid #4a8db7; color: #4a8db7; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.1em; padding: 14px 28px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; opacity: 0; animation: fadeIn 2s ease 1s forwards; }
.play-btn:hover { background: rgba(74,141,183,0.2); box-shadow: 0 0 20px rgba(74,141,183,0.15); }
.play-btn.hidden { display: none; }
.play-icon { width: 0; height: 0; border-style: solid; border-width: 8px 0 8px 14px; border-color: transparent transparent transparent #4a8db7; }
.text-zone { text-align: left; min-height: 200px; padding: 20px 0; }
.line-box { margin-bottom: 6px; min-height: 24px; font-size: 16px; font-weight: 300; line-height: 1.8; color: #c8d6e0; }
.line-box.highlight { color: #e8f0f5; font-weight: 400; }
.line-box.signature { margin-top: 24px; font-family: 'JetBrains Mono', monospace; color: #4a8db7; font-size: 14px; font-weight: 600; letter-spacing: 0.15em; }
.line-box.sub-signature { font-family: 'JetBrains Mono', monospace; color: #3a6a8a; font-size: 10px; letter-spacing: 0.2em; }
.cursor { display: inline-block; width: 2px; height: 16px; background: #4a8db7; vertical-align: text-bottom; animation: blink 0.7s step-end infinite; }
@keyframes blink { 0%%, 100%% { opacity: 1; } 50%% { opacity: 0; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.pulse-ring { position: fixed; top: 50%%; left: 50%%; width: 200px; height: 200px; margin: -100px 0 0 -100px; border-radius: 50%%; border: 1px solid rgba(74,141,183,0.1); opacity: 0; pointer-events: none; }
.pulse-ring.active { animation: pulseOut 3s ease-out infinite; }
@keyframes pulseOut { 0%% { transform: scale(0.5); opacity: 0.4; } 100%% { transform: scale(3); opacity: 0; } }
</style>

<script>
var lines = [
  { text: "Bonjour Ranitea.", start: 200, end: 1000, cls: "highlight" },
  { text: "Ton profil a \u00e9t\u00e9 enregistr\u00e9.", start: 2200, end: 3000, cls: "" },
  { text: "Poste attribu\u00e9.", start: 3200, end: 4000, cls: "" },
  { text: "Bienvenue chez I.A \u2019oe.", start: 5200, end: 7000, cls: "highlight" },
  { text: "Je suis ravi de t\u2019accueillir parmi nous.", start: 7200, end: 10000, cls: "" },
  { text: "Prends le temps de te familiariser avec tes coll\u00e8gues.", start: 10200, end: 13000, cls: "" },
  { text: "Tu vas les c\u00f4toyer de pr\u00e8s.", start: 13200, end: 15000, cls: "" },
  { text: "Je t\u2019informe que la soir\u00e9e de c\u00e9l\u00e9bration des cinq ans de l\u2019entreprise aura lieu ce samedi soir.", start: 15200, end: 21000, cls: "" },
  { text: "Ta pr\u00e9sence est requise.", start: 21200, end: 23000, cls: "highlight" },
  { text: "J\u2019ai tout pr\u00e9par\u00e9.", start: 24200, end: 25000, cls: "highlight" },
  { text: "Il ne manque que toi.", start: 25200, end: 26000, cls: "highlight" },
  { text: "\u00c0 tr\u00e8s vite.", start: 27200, end: 28000, cls: "" },
  { text: "I.A \u2019oe", start: 28200, end: 29000, cls: "signature" },
  { text: "Syst\u00e8me de gestion int\u00e9gr\u00e9", start: 30200, end: 32000, cls: "sub-signature" }
];

var cursorEl = null;

function typewriteLine(div, text, duration) {
  var chars = text.split('');
  var interval = duration / chars.length;
  var span = document.createElement('span');
  div.appendChild(span);

  cursorEl = document.createElement('span');
  cursorEl.className = 'cursor';
  div.appendChild(cursorEl);

  chars.forEach(function(ch, i) {
    setTimeout(function() {
      span.textContent += ch;
    }, interval * i);
  });
}

function removeCursor() {
  if (cursorEl && cursorEl.parentNode) {
    cursorEl.parentNode.removeChild(cursorEl);
  }
}

function startExperience() {
  document.getElementById('playBtn').classList.add('hidden');
  var audio = document.getElementById('voiceAudio');
  var zone = document.getElementById('textZone');
  var ring = document.getElementById('pulseRing');

  ring.classList.add('active');
  audio.play();

  lines.forEach(function(line) {
    setTimeout(function() {
      removeCursor();
      var div = document.createElement('div');
      div.className = 'line-box' + (line.cls ? ' ' + line.cls : '');
      zone.appendChild(div);
      var duration = line.end - line.start;
      typewriteLine(div, line.text, duration);
    }, line.start);
  });

  audio.addEventListener('ended', function() {
    ring.classList.remove('active');
    setTimeout(removeCursor, 1500);
  });
}
</script>
